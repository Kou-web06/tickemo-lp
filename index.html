    <style>

</head>

<body class="antialiased selection:bg-brand-500 selection:text-white">

    <main>
        <!-- 1. Hero Section -->
        <section class="relative pt-24 sm:pt-28 pb-6 px-5 sm:px-8 md:px-16 lg:px-24 max-h-[100dvh] md:max-h-[calc(100dvh-64px)] flex flex-col justify-between">
            <div
                class="max-w-6xl mx-auto w-full flex flex-col md:flex-row items-center justify-between gap-2 z-10 flex-grow mt-auto mb-auto">

                <!-- Left: Text & CTA -->
                <div class="w-full md:w-1/2 flex flex-col items-center md:items-start text-center md:text-left">
                    <h1
                        class="text-3xl sm:text-4xl md:text-5xl lg:text-7xl font-black tracking-tight mb-4 sm:mb-6 text-gradient leading-tight flex flex-col gap-0.5 sm:gap-1">
                        <span data-i18n="hero.line1">チケットも、</span>
                        <span data-i18n="hero.line2">セトリも、</span>
                        <span data-i18n="hero.line3">感動も。</span>
                    </h1>
                    <p class="text-gray-400 text-sm sm:text-base md:text-xl md:max-w-lg mb-6 sm:mb-10 leading-relaxed" data-i18n="hero.desc">
                        ライブの思い出を、美しく記録しよう。<br class="hidden md:block" />
                        チケット、セトリ、参戦履歴。<br class="hidden md:block" />あの日の熱狂をそのまま残せるデジタルジャーナル。

                            <img src="./images/appleStoreBadge.svg" alt="Download on the App Store"
                                class="h-10 sm:h-12">
                        </a>
                        <a href="https://orynth.dev/projects/tickemo" target="_blank" rel="noopener" class="w-40">
                            <img src="https://orynth.dev/api/badge/tickemo?theme=dark&style=default" alt="Featured on Orynth" width="260" height="110" />
                        </a>
                        <a href="https://www.producthunt.com/products/tickemo?embed=true&amp;utm_source=badge-featured&amp;utm_medium=badge&amp;utm_campaign=badge-tickemo" target="_blank" rel="noopener noreferrer">
                            <img alt="Tickemo - The ultimate ticket &amp; setlist manager for live music fans. | Product Hunt" width="250" height="54" src="https://api.producthunt.com/widgets/embed-image/v1/featured.svg?post_id=1089804&amp;theme=dark&amp;t=1772759303366">
                        </a>
                    </div>
                </div>

                <!-- Right: Mockup Image -->
                <div class="w-3/4 sm:w-2/3 md:w-1/2 flex justify-center md:justify-end">
                    <img src="./images/mockup.png" alt="Tickemo App Mockup"
                        class="w-full max-w-[220px] sm:max-w-[280px] md:max-w-[400px] h-auto drop-shadow-2xl object-contain">
                </div>

            </div>

            <!-- Footer integrated inside the main view to be at the bottom -->
            <footer class="w-full pt-4 md:pt-8 pb-4 md:pb-8 px-4 sm:px-6 bg-transparent z-10">
                <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4 sm:gap-6">
                    <a href="#" class="flex items-center gap-2 font-bold text-base sm:text-xl text-white/80">
                        <img src="images/favicon.png" alt="Tickemo" class="w-6 h-6 sm:w-8 sm:h-8 rounded-xl">
                        Tickemo
                    </a>

                    <div
                        class="flex flex-col sm:flex-row justify-center gap-3 sm:gap-8 text-xs sm:text-sm text-gray-500 text-center">
                        <a href="https://www.notion.so/Tickemo-Terms-of-Use-2f65fd5d3e2d80ba8abcda85615cde4a?source=copy_link"

                        <a href="https://www.notion.so/Tickemo-Privacy-Policy-2f85fd5d3e2d809b912dfc4ec2a2ed6a?source=copy_link "
                            class="hover:text-gray-300 transition-colors" data-i18n="footer.privacy">プライバシーポリシー</a>
                    </div>

                    <div class="text-xs text-gray-600 text-center md:text-right space-y-1">
                        <p>&copy; 2026 Tickemo. All rights reserved.</p>
                    </div>
                </div>
            </footer>
        </section>
    </main>

    <script>
        const translations = {
            ja: {
                'page.title': 'Tickemo | ライブの思い出をエモく記録',
                'page.description': 'すべてのライブを、美しくコレクション。次の参戦日まで楽しめる推し活記録アプリ。',
                'hero.line1': 'チケットも、',
                'hero.line2': 'セトリも、',
                'hero.line3': '感動も。',
                'hero.desc': 'ライブの思い出を、美しく記録しよう。<br class="hidden md:block" />チケット、セトリ、参戦履歴。<br class="hidden md:block" />あの日の熱狂をそのまま残せるデジタルジャーナル。',
                'footer.terms': '利用規約',
                'footer.privacy': 'プライバシーポリシー',
                'footer.contact': 'お問い合わせ'
            },
            en: {
                'page.title': 'Tickemo | Record Your Live Memories',
                'page.description': 'Beautifully collect all your live experiences. A fan-life journal app to enjoy until your next concert.',
                'hero.line1': 'Tickets,',
                'hero.line2': 'setlists,',
                'hero.line3': 'moments.',
                'hero.desc': 'Record your live memories beautifully.<br class="hidden md:block" />Tickets, setlists, concert history.<br class="hidden md:block" />A digital journal that preserves the passion of that day.',
                'footer.terms': 'Terms of Use',
                'footer.privacy': 'Privacy Policy',
                'footer.contact': 'Contact'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'ja';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;

            document.getElementById('page-title').textContent = translations[lang]['page.title'];
            document.getElementById('page-description').setAttribute('content', translations[lang]['page.description']);
            document.getElementById('lang-label').textContent = lang === 'ja' ? 'EN' : '日本語';
            document.getElementById('lang-toggle').setAttribute('aria-label', lang === 'ja' ? 'Switch to English' : '日本語に切り替え');

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const text = translations[lang][key];
                if (text) {
                    if (key === 'hero.desc') {
                        el.innerHTML = text;
                    } else {
                        el.textContent = text;
                    }
                }
            });
        }

        document.getElementById('lang-toggle').addEventListener('click', () => {
            setLanguage(currentLang === 'ja' ? 'en' : 'ja');
        });

        setLanguage(currentLang);
    </script>
</body>

</html>
